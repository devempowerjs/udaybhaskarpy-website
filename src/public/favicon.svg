<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Dark background -->
  <rect width="128" height="128" fill="#0f172a" rx="24"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="pythonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3776ab;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd43b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Center icon group -->
  <g transform="translate(64, 64)">
    <!-- Data visualization bars (ascending) -->
    <rect x="-28" y="4" width="10" height="28" fill="#10b981" rx="2"/>
    <rect x="-12" y="-8" width="10" height="40" fill="#06b6d4" rx="2"/>
    <rect x="4" y="-20" width="10" height="52" fill="#8b5cf6" rx="2"/>
    <rect x="20" y="-12" width="10" height="44" fill="#f59e0b" rx="2"/>
    
    <!-- Python snake accent line connecting the data -->
    <path d="M -22 8 Q -10 -5 10 -15 Q 25 -18 28 -8" 
          stroke="#3776ab" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    
    <!-- Accent highlight -->
    <path d="M -22 8 Q -10 -5 10 -15 Q 25 -18 28 -8" 
          stroke="#ffd43b" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    
    <!-- Data points -->
    <circle cx="-22" cy="8" r="3" fill="#ffd43b"/>
    <circle cx="10" cy="-15" r="3" fill="#ffd43b"/>
    <circle cx="28" cy="-8" r="3" fill="#ffd43b"/>
  </g>
</svg>